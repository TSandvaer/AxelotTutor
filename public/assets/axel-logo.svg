<?xml version="1.0" encoding="UTF-8"?>
<!--
  axel-logo.svg — Axel-the-axolotl logo + wordmark.
  Spec: design/axel-character-bible.md (UX-03, 86c9gqq04).

  Used on the Splash screen. Head-only crop of the idle pose: gill rosettes
  fanned out, soft smile, lily-pad on top. Below the head: "Axel" wordmark
  in rounded display sans, with a coral heart flourish underneath.

  ViewBox 0..256×320 to match the existing Splash usage (`w-60 max-w-[60vw]`).
  Head is centered upper square (0..256 × 0..220); wordmark sits at y≈252.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 320" role="img" aria-label="Axel">
  <title>Axel</title>

  <!-- HEAD MARK, centered upper square -->
  <g transform="translate(128 110)">

    <!-- LEFT GILL FRONDS (3 small fronds) -->
    <g stroke="#3D2B3D" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round">
      <path d="M -42 -52 C -64 -78, -84 -94, -90 -78 C -90 -66, -78 -54, -60 -46 C -50 -42, -44 -42, -42 -46 Z" fill="#FFB5A0"/>
      <path d="M -44 -36 C -78 -36, -100 -28, -102 -18 C -98 -8, -82 -4, -64 -10 C -52 -14, -44 -22, -44 -32 Z" fill="#FFB5A0"/>
      <path d="M -44 -20 C -76 -10, -94 4, -90 16 C -84 22, -68 18, -54 8 C -46 2, -44 -8, -44 -16 Z" fill="#FFB5A0"/>
    </g>

    <!-- RIGHT GILL FRONDS (mirrored) -->
    <g stroke="#3D2B3D" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round">
      <path d="M 42 -52 C 64 -78, 84 -94, 90 -78 C 90 -66, 78 -54, 60 -46 C 50 -42, 44 -42, 42 -46 Z" fill="#FFB5A0"/>
      <path d="M 44 -36 C 78 -36, 100 -28, 102 -18 C 98 -8, 82 -4, 64 -10 C 52 -14, 44 -22, 44 -32 Z" fill="#FFB5A0"/>
      <path d="M 44 -20 C 76 -10, 94 4, 90 16 C 84 22, 68 18, 54 8 C 46 2, 44 -8, 44 -16 Z" fill="#FFB5A0"/>
    </g>

    <!-- HEAD (mint) -->
    <ellipse cx="0" cy="0" rx="56" ry="48" fill="#A8E0D5" stroke="#3D2B3D" stroke-width="3"/>

    <!-- LILY PAD on top -->
    <g transform="translate(26 -42)">
      <path d="M -14 0 A 14 14 0 1 1 14 0 A 14 14 0 1 1 -14 0 L -4 0 L 0 -11 L 4 0 Z"
        fill="#7FB069" stroke="#3D2B3D" stroke-width="2" stroke-linejoin="round"/>
    </g>

    <!-- EYES -->
    <ellipse cx="-16" cy="2" rx="3.6" ry="4.4" fill="#3D2B3D"/>
    <ellipse cx=" 16" cy="2" rx="3.6" ry="4.4" fill="#3D2B3D"/>
    <circle cx="-14" cy="0" r="1.2" fill="#FFF7EE"/>
    <circle cx=" 18" cy="0" r="1.2" fill="#FFF7EE"/>

    <!-- CHEEK BLUSH -->
    <ellipse cx="-26" cy="14" rx="6" ry="3" fill="#FFB5A0" opacity="0.6"/>
    <ellipse cx=" 26" cy="14" rx="6" ry="3" fill="#FFB5A0" opacity="0.6"/>

    <!-- SMILE -->
    <path d="M -10 16 Q 0 24, 10 16" fill="none" stroke="#3D2B3D" stroke-width="2.4" stroke-linecap="round"/>

    <!-- HEART MEDALLION (small, on lower edge of head) -->
    <g transform="translate(0 38)">
      <path d="M 0 8 C -3 5, -10 5, -10 0 C -10 -5, -4 -7, 0 -3 C 4 -7, 10 -5, 10 0 C 10 5, 3 5, 0 8 Z"
        fill="#FFB5A0" stroke="#3D2B3D" stroke-width="1.5" stroke-linejoin="round"/>
    </g>

  </g>

  <!-- WORDMARK -->
  <g transform="translate(128 252)" text-anchor="middle">
    <text x="0" y="0"
      font-family="-apple-system, 'SF Pro Rounded', 'SF Pro', 'Segoe UI', system-ui, sans-serif"
      font-weight="700"
      font-size="44"
      letter-spacing="1.5"
      fill="#3D2B3D">Axel</text>
    <!-- Heart flourish below -->
    <path d="M 0 18
      C -3 13, -10 13, -10 19
      C -10 24, -5 27, 0 30
      C 5 27, 10 24, 10 19
      C 10 13, 3 13, 0 18 Z"
      fill="#FFB5A0" stroke="#3D2B3D" stroke-width="1.6" stroke-linejoin="round"/>
  </g>
</svg>
