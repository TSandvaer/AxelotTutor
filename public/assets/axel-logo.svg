<?xml version="1.0" encoding="UTF-8"?>
<!--
  axel-logo.svg — PLACEHOLDER
  Carried over from MarianLearning as a placeholder. Kyle replaces this with
  Axel-the-axolotl artwork (logo + wordmark) in UX-03.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 320" role="img" aria-label="Axel">
  <title>Axel</title>

  <!-- Bunny mark, centered upper square (0..256 x 0..220) -->
  <g transform="translate(128 132)">

    <!-- LEFT EAR (outer) — extends up + out, gentle inward curve at tip -->
    <path d="
      M -42 -28
      C -64 -56, -74 -90, -64 -114
      C -56 -130, -40 -132, -30 -118
      C -22 -104, -22 -82, -28 -58
      C -32 -42, -38 -32, -42 -28 Z"
      fill="#FFC0CB" stroke="#3D2B3D" stroke-width="3" stroke-linejoin="round"/>
    <!-- LEFT EAR inner panel -->
    <path d="
      M -40 -38
      C -54 -60, -60 -86, -54 -104
      C -50 -114, -42 -116, -38 -108
      C -34 -96, -34 -80, -38 -62
      C -40 -52, -40 -42, -40 -38 Z"
      fill="#FFF5F0"/>

    <!-- RIGHT EAR (outer) -->
    <path d="
      M 42 -28
      C 64 -56, 74 -90, 64 -114
      C 56 -130, 40 -132, 30 -118
      C 22 -104, 22 -82, 28 -58
      C 32 -42, 38 -32, 42 -28 Z"
      fill="#FFC0CB" stroke="#3D2B3D" stroke-width="3" stroke-linejoin="round"/>
    <!-- RIGHT EAR inner panel -->
    <path d="
      M 40 -38
      C 54 -60, 60 -86, 54 -104
      C 50 -114, 42 -116, 38 -108
      C 34 -96, 34 -80, 38 -62
      C 40 -52, 40 -42, 40 -38 Z"
      fill="#FFF5F0"/>

    <!-- HOOD: rounded dome silhouette covering top of head -->
    <path d="
      M -78 -8
      C -84 -52, -64 -86, -36 -96
      C -12 -104, 12 -104, 36 -96
      C 64 -86, 84 -52, 78 -8
      C 76 22, 56 36, 36 40
      L -36 40
      C -56 36, -76 22, -78 -8 Z"
      fill="#FFC0CB" stroke="#3D2B3D" stroke-width="3" stroke-linejoin="round"/>

    <!-- FACE: cream oval peeking from hood -->
    <ellipse cx="0" cy="14" rx="52" ry="44" fill="#FFF5F0" stroke="#3D2B3D" stroke-width="3"/>

    <!-- FLOWER on hood side (large enough to read at 200px) -->
    <g transform="translate(56 -32)">
      <!-- 5 white petals in pentagon arrangement -->
      <ellipse cx="0"   cy="-12" rx="7" ry="9"  fill="#FFF5F0" stroke="#3D2B3D" stroke-width="2" transform="rotate(0)"/>
      <ellipse cx="11"  cy="-4"  rx="7" ry="9"  fill="#FFF5F0" stroke="#3D2B3D" stroke-width="2" transform="rotate(72 11 -4)"/>
      <ellipse cx="7"   cy="10"  rx="7" ry="9"  fill="#FFF5F0" stroke="#3D2B3D" stroke-width="2" transform="rotate(144 7 10)"/>
      <ellipse cx="-7"  cy="10"  rx="7" ry="9"  fill="#FFF5F0" stroke="#3D2B3D" stroke-width="2" transform="rotate(216 -7 10)"/>
      <ellipse cx="-11" cy="-4"  rx="7" ry="9"  fill="#FFF5F0" stroke="#3D2B3D" stroke-width="2" transform="rotate(288 -11 -4)"/>
      <!-- Yellow center -->
      <circle r="6" fill="#FFD966" stroke="#3D2B3D" stroke-width="2"/>
    </g>

    <!-- EYES: simple black-ish dots -->
    <ellipse cx="-16" cy="10" rx="3.6" ry="4.4" fill="#3D2B3D"/>
    <ellipse cx=" 16" cy="10" rx="3.6" ry="4.4" fill="#3D2B3D"/>

    <!-- CHEEK dabs -->
    <ellipse cx="-26" cy="24" rx="6" ry="3.2" fill="#F8C8DC"/>
    <ellipse cx=" 26" cy="24" rx="6" ry="3.2" fill="#F8C8DC"/>

    <!-- NOSE: small pink triangle -->
    <path d="M -3 20 L 3 20 L 0 24 Z" fill="#F48FB1" stroke="#3D2B3D" stroke-width="1.4" stroke-linejoin="round"/>

    <!-- SMILE -->
    <path d="M -7 30 Q 0 36, 7 30" fill="none" stroke="#3D2B3D" stroke-width="2.4" stroke-linecap="round"/>
  </g>

  <!-- Wordmark "Axel" -->
  <g transform="translate(128 252)" text-anchor="middle">
    <text x="0" y="0"
      font-family="-apple-system, 'SF Pro Rounded', 'SF Pro', 'Segoe UI', system-ui, sans-serif"
      font-weight="700"
      font-size="44"
      letter-spacing="1.5"
      fill="#3D2B3D">Axel</text>
    <!-- Heart flourish below -->
    <path d="M 0 18
      C -3 13, -10 13, -10 19
      C -10 24, -5 27, 0 30
      C 5 27, 10 24, 10 19
      C 10 13, 3 13, 0 18 Z"
      fill="#F48FB1" stroke="#3D2B3D" stroke-width="1.6" stroke-linejoin="round"/>
  </g>
</svg>
