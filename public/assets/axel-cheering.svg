<?xml version="1.0" encoding="UTF-8"?>
<!--
  axel-cheering.svg — PLACEHOLDER
  Carried over from MarianLearning. Kyle replaces with the Axel cheering pose
  in UX-03 (celebration without being frantic).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Axel, cheering">
  <title>Axel — cheering</title>

  <g transform="translate(400 410)">

    <!-- ========== BODY ========== -->
    <ellipse cx="-46" cy="320" rx="36" ry="22" fill="#FFF5F0" stroke="#3D2B3D" stroke-width="5"/>
    <ellipse cx=" 46" cy="320" rx="36" ry="22" fill="#FFF5F0" stroke="#3D2B3D" stroke-width="5"/>

    <path d="
      M -110 110
      C -130 180, -120 280, -70 310
      C -30 322,  30 322,  70 310
      C  120 280, 130 180, 110 110
      C  90  90,  -90  90, -110 110 Z"
      fill="#FFF5F0" stroke="#3D2B3D" stroke-width="5" stroke-linejoin="round"/>

    <!-- Ribbon -->
    <g transform="translate(0 165)">
      <path d="M -34 -8 C -44 -22, -28 -28, -14 -14 L -14 6 C -28 12, -44 8, -34 -8 Z"
        fill="#F48FB1" stroke="#3D2B3D" stroke-width="3.5" stroke-linejoin="round"/>
      <path d="M  34 -8 C  44 -22,  28 -28,  14 -14 L  14 6 C  28 12,  44 8,  34 -8 Z"
        fill="#F48FB1" stroke="#3D2B3D" stroke-width="3.5" stroke-linejoin="round"/>
      <rect x="-12" y="-12" width="24" height="20" rx="4" fill="#F48FB1" stroke="#3D2B3D" stroke-width="3.5"/>
    </g>

    <!-- ========== EARS (peak height, slight outward splay) ========== -->
    <g transform="rotate(-6 -90 -110)">
      <path d="
        M -90 -110
        C -150 -180, -170 -280, -150 -340
        C -130 -370,  -90 -362,  -76 -320
        C  -64 -270,  -64 -200,  -72 -150
        C  -78 -126, -84 -114, -90 -110 Z"
        fill="#FFC0CB" stroke="#3D2B3D" stroke-width="5" stroke-linejoin="round"/>
      <path d="
        M -88 -130
        C -130 -190, -148 -270, -134 -316
        C -120 -340,  -98 -334,  -90 -304
        C  -82 -260,  -82 -210,  -86 -170
        C  -88 -148, -88 -134, -88 -130 Z"
        fill="#FFF5F0"/>
    </g>

    <g transform="rotate(6 90 -110)">
      <path d="
        M 90 -110
        C 150 -180, 170 -280, 150 -340
        C 130 -370,  90 -362,  76 -320
        C  64 -270,  64 -200,  72 -150
        C  78 -126, 84 -114, 90 -110 Z"
        fill="#FFC0CB" stroke="#3D2B3D" stroke-width="5" stroke-linejoin="round"/>
      <path d="
        M 88 -130
        C 130 -190, 148 -270, 134 -316
        C 120 -340,  98 -334,  90 -304
        C  82 -260,  82 -210,  86 -170
        C  88 -148, 88 -134, 88 -130 Z"
        fill="#FFF5F0"/>
    </g>

    <!-- ========== HOOD ========== -->
    <path d="
      M -180 20
      C -200 -80, -160 -170, -100 -200
      C  -50 -220,   50 -220,  100 -200
      C  160 -170,  200 -80,  180  20
      C  170  60,  120  84,   80  90
      L -80  90
      C -120  84, -170  60, -180  20 Z"
      fill="#FFC0CB" stroke="#3D2B3D" stroke-width="5" stroke-linejoin="round"/>

    <!-- LEFT arm (raised high, drawn AFTER hood so it appears in front;
         path starts at body shoulder, sweeps up + outward, paw at top) -->
    <path d="
      M -110 110
      C -160  80, -220  10, -240 -100
      C -250 -160, -220 -180, -200 -150
      C -180 -100, -150  -30, -120  60
      C -110  90, -110 100, -110 110 Z"
      fill="#FFF5F0" stroke="#3D2B3D" stroke-width="5" stroke-linejoin="round"/>

    <!-- RIGHT arm -->
    <path d="
      M 110 110
      C 160  80, 220  10, 240 -100
      C 250 -160, 220 -180, 200 -150
      C 180 -100, 150  -30, 120  60
      C 110  90, 110 100, 110 110 Z"
      fill="#FFF5F0" stroke="#3D2B3D" stroke-width="5" stroke-linejoin="round"/>

    <!-- ========== FACE ========== -->
    <ellipse cx="0" cy="20" rx="116" ry="98" fill="#FFF5F0" stroke="#3D2B3D" stroke-width="5"/>

    <!-- SPARKLE EYES: 4-point stars in soft aubergine -->
    <g fill="#3D2B3D">
      <path d="M -40 4 l 4 12 l 12 4 l -12 4 l -4 12 l -4 -12 l -12 -4 l 12 -4 z"/>
      <path d="M  40 4 l 4 12 l 12 4 l -12 4 l -4 12 l -4 -12 l -12 -4 l 12 -4 z"/>
    </g>
    <!-- Tiny white highlights inside the stars -->
    <circle cx="-36" cy="16" r="2.5" fill="#FFF5F0"/>
    <circle cx=" 44" cy="16" r="2.5" fill="#FFF5F0"/>

    <!-- Cheek blush (deeper / wider for cheer) -->
    <ellipse cx="-66" cy="50" rx="22" ry="11" fill="#F8C8DC"/>
    <ellipse cx=" 66" cy="50" rx="22" ry="11" fill="#F8C8DC"/>

    <!-- Nose -->
    <path d="M -7 38 L 7 38 L 0 48 Z"
      fill="#F48FB1" stroke="#3D2B3D" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Big open smile -->
    <path d="M -28 60 Q 0 96, 28 60 Q 0 80, -28 60 Z"
      fill="#3D2B3D" stroke="#3D2B3D" stroke-width="2" stroke-linejoin="round"/>
    <!-- Tongue -->
    <path d="M -14 76 Q 0 88, 14 76 Q 0 82, -14 76 Z" fill="#F48FB1"/>

    <!-- ========== FLOWER ========== -->
    <g transform="translate(130 -120)">
      <ellipse cx="0"   cy="-26" rx="14" ry="20" fill="#FFF5F0" stroke="#3D2B3D" stroke-width="4"/>
      <ellipse cx="25"  cy="-8"  rx="14" ry="20" fill="#FFF5F0" stroke="#3D2B3D" stroke-width="4" transform="rotate(72 25 -8)"/>
      <ellipse cx="15"  cy="22"  rx="14" ry="20" fill="#FFF5F0" stroke="#3D2B3D" stroke-width="4" transform="rotate(144 15 22)"/>
      <ellipse cx="-15" cy="22"  rx="14" ry="20" fill="#FFF5F0" stroke="#3D2B3D" stroke-width="4" transform="rotate(216 -15 22)"/>
      <ellipse cx="-25" cy="-8"  rx="14" ry="20" fill="#FFF5F0" stroke="#3D2B3D" stroke-width="4" transform="rotate(288 -25 -8)"/>
      <circle r="12" fill="#FFD966" stroke="#3D2B3D" stroke-width="4"/>
    </g>

    <!-- ========== ABUNDANT SPARKLE PUFFS ========== -->
    <g fill="#FFD966" stroke="#3D2B3D" stroke-width="2.5" stroke-linejoin="round">
      <path d="M -300 -160 l 7 22 l 22 7 l -22 7 l -7 22 l -7 -22 l -22 -7 l 22 -7 z"/>
      <path d="M  300 -180 l 6 18 l 18 6 l -18 6 l -6 18 l -6 -18 l -18 -6 l 18 -6 z"/>
      <path d="M -260  -40 l 5 14 l 14 5 l -14 5 l -5 14 l -5 -14 l -14 -5 l 14 -5 z"/>
      <path d="M  260  -60 l 5 14 l 14 5 l -14 5 l -5 14 l -5 -14 l -14 -5 l 14 -5 z"/>
      <path d="M -220  140 l 4 11 l 11 4 l -11 4 l -4 11 l -4 -11 l -11 -4 l 11 -4 z"/>
      <path d="M  220  150 l 4 11 l 11 4 l -11 4 l -4 11 l -4 -11 l -11 -4 l 11 -4 z"/>
      <path d="M    0 -360 l 5 14 l 14 5 l -14 5 l -5 14 l -5 -14 l -14 -5 l 14 -5 z"/>
    </g>

  </g>
</svg>
