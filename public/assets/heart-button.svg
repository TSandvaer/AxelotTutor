<?xml version="1.0" encoding="UTF-8"?>
<!--
  heart-button.svg
  Primary CTA on Greet screen. Filled pink heart, soft shadow, slight highlight.
  - viewBox 0 0 120 100 — author-rendered at 120pt × 100pt per spec (88pt tall × 120pt wide button)
  - Icon-only; no text. Axel narrates the action via TTS.
  - Target <4 KB.
  - Spec calls for idle bob + tap squish in component code; this asset is the static glyph.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" role="img" aria-label="Heart">
  <title>Heart</title>
  <defs>
    <linearGradient id="heartFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFB6C5"/>
      <stop offset="100%" stop-color="#F48FB1"/>
    </linearGradient>
    <radialGradient id="shine" cx="38%" cy="32%" r="22%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Drop shadow (offset, soft) -->
  <path d="
    M 60 92
    C 30 74, 8 56, 8 34
    C 8 18, 22 8, 36 8
    C 48 8, 58 16, 60 24
    C 62 16, 72 8, 84 8
    C 98 8, 112 18, 112 34
    C 112 56, 90 74, 60 92 Z"
    fill="#3D2B3D" opacity="0.10" transform="translate(0 4)"/>
  <!-- Heart body -->
  <path d="
    M 60 88
    C 30 70, 8 52, 8 30
    C 8 14, 22 4, 36 4
    C 48 4, 58 12, 60 20
    C 62 12, 72 4, 84 4
    C 98 4, 112 14, 112 30
    C 112 52, 90 70, 60 88 Z"
    fill="url(#heartFill)" stroke="#E07AA0" stroke-width="2" stroke-linejoin="round"/>
  <!-- Highlight -->
  <ellipse cx="42" cy="26" rx="14" ry="8" fill="url(#shine)"/>
</svg>
