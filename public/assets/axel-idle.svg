    <ellipse cx="128" cy="220" rx="22" ry="14" fill="#FFF7EE" stroke="#3D2B3D" stroke-width="4"/>

    <!-- HEART MEDALLION -->
    <g transform="translate(0 170)">
      <path d="M 0 22 C -8 14, -28 14, -28 0 C -28 -14, -10 -18, 0 -6 C 10 -18, 28 -14, 28 0 C 28 14, 8 14, 0 22 Z"
