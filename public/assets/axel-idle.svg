    <!-- RIGHT GILL FRONDS -->
    <g stroke="#3D2B3D" stroke-width="4" stroke-linejoin="round" stroke-linecap="round">
      <path d="M 94 -120 C 160 -180, 200 -210, 208 -180 C 210 -156, 180 -130, 140 -110 C 120 -100, 100 -100, 94 -110 Z" fill="#FFB5A0"/>
      <path d="M 130 -148 C 172 -178, 198 -188, 202 -178" fill="none" stroke="#F08070" stroke-width="3"/>
      <path d="M 98 -90 C 180 -90, 226 -76, 230 -50 C 224 -28, 190 -20, 150 -32 C 120 -42, 100 -56, 98 -76 Z" fill="#FFB5A0"/>
      <path d="M 140 -64 C 200 -56, 222 -48, 222 -38" fill="none" stroke="#F08070" stroke-width="3"/>
      <path d="M 100 -52 C 170 -28, 206 -2, 200 24 C 188 42, 156 38, 126 18 C 110 6, 100 -16, 100 -40 Z" fill="#FFB5A0"/>
      <path d="M 136 -10 C 184 8, 202 22, 198 32" fill="none" stroke="#F08070" stroke-width="3"/>
    </g>

    <!-- HEAD -->
    <ellipse cx="0" cy="-60" rx="116" ry="100" fill="#A8E0D5" stroke="#3D2B3D" stroke-width="5"/>

    <!-- EYES -->
    <ellipse cx="-36" cy="-58" rx="9" ry="11" fill="#3D2B3D"/>
    <ellipse cx=" 36" cy="-58" rx="9" ry="11" fill="#3D2B3D"/>
    <circle cx="-32" cy="-62" r="2.5" fill="#FFF7EE"/>
    <circle cx=" 40" cy="-62" r="2.5" fill="#FFF7EE"/>

    <!-- CHEEK BLUSH -->
    <ellipse cx="-58" cy="-30" rx="14" ry="7" fill="#FFB5A0" opacity="0.6"/>
    <ellipse cx=" 58" cy="-30" rx="14" ry="7" fill="#FFB5A0" opacity="0.6"/>

    <!-- SMILE -->
    <path d="M -22 -16 Q 0 -2, 22 -16" fill="none" stroke="#3D2B3D" stroke-width="5" stroke-linecap="round"/>

    <!-- LILY PAD -->
    <g transform="translate(56 -150)">
      <path d="M -28 0 A 28 28 0 1 1 28 0 A 28 28 0 1 1 -28 0 L -8 0 L 0 -22 L 8 0 Z"
        fill="#7FB069" stroke="#3D2B3D" stroke-width="3" stroke-linejoin="round"/>
      <path d="M -16 8 Q 0 14, 16 8" fill="none" stroke="#3D2B3D" stroke-width="2" opacity="0.5"/>
    </g>

  </g>
</svg>
