      <path d="M -130 -148 C -172 -178, -198 -188, -202 -178" fill="none" stroke="#F08070" stroke-width="3"/>
      <path d="M -98 -90 C -180 -90, -226 -76, -230 -50 C -224 -28, -190 -20, -150 -32 C -120 -42, -100 -56, -98 -76 Z" fill="#FFB5A0"/>
