      <path d="M -100 -52 C -170 -28, -206 -2, -200 24 C -188 42, -156 38, -126 18 C -110 6, -100 -16, -100 -40 Z" fill="#FFB5A0"/>
      <path d="M -136 -10 C -184 8, -202 22, -198 32" fill="none" stroke="#F08070" stroke-width="3"/>
