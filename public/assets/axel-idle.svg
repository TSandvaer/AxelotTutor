<?xml version="1.0" encoding="UTF-8"?>
<!--
  axel-idle.svg — Axel-the-axolotl, idle pose.
  Spec: design/axel-character-bible.md (UX-03, 86c9gqq04).

  Rounded mint-aqua body, cream belly, six coral gill-fronds (3 each side,
  fanned at gentle rest), small black bead eyes, "permanent baby" smile, a
  coral heart on the chest (replaces ribbon), one lily pad on the head
  (replaces flower). ViewBox 0..800; character anchored at translate(400 410)
  so existing screens that center him on h-[60vh] / h-[38vh] read identically.

  Palette (post-UX-03 tailwind tokens):
    body mint   #A8E0D5  (axel-300)
    body shade  #5BBFAE  (axel-500)
    belly cream #FFF7EE  (axel-cream)
    gill coral  #FFB5A0  (axel-pink)
    coral deep  #F08070  (axel-rose)
    ink         #3D2B3D  (ink)
    sparkle     #FFD966  (sparkle, unused on idle)
    lily green  #7FB069  (lily-pad accent)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Axel, smiling">
  <title>Axel — idle</title>
  <g transform="translate(400 410)">

    <!-- TAIL -->
    <path d="M 70 240 C 130 260, 170 280, 180 320 C 175 348, 140 358, 100 348 C 80 340, 70 318, 70 280 Z"
      fill="#5BBFAE" stroke="#3D2B3D" stroke-width="5" stroke-linejoin="round"/>
    <path d="M 78 312 C 110 332, 150 332, 168 318 C 158 342, 130 354, 100 348 C 86 344, 78 330, 78 312 Z"
      fill="#FFF7EE"/>

    <!-- LEGS / FEET -->
    <g stroke="#3D2B3D" stroke-width="5" stroke-linejoin="round" stroke-linecap="round">
      <ellipse cx="-66" cy="318" rx="34" ry="20" fill="#A8E0D5"/>
      <ellipse cx=" 66" cy="318" rx="34" ry="20" fill="#A8E0D5"/>
      <path d="M -84 332 L -84 340" fill="none"/>
      <path d="M -66 336 L -66 344" fill="none"/>
      <path d="M -48 332 L -48 340" fill="none"/>
      <path d="M  48 332 L  48 340" fill="none"/>
      <path d="M  66 336 L  66 344" fill="none"/>
      <path d="M  84 332 L  84 340" fill="none"/>
    </g>

    <!-- BODY -->
    <path d="M -130 60 C -150 150, -130 270, -70 308 C -30 320, 30 320, 70 308 C 130 270, 150 150, 130 60 C 100 30, -100 30, -130 60 Z"
      fill="#A8E0D5" stroke="#3D2B3D" stroke-width="5" stroke-linejoin="round"/>
    <path d="M -78 130 C -90 200, -70 290, -34 304 C -10 312, 10 312, 34 304 C 70 290, 90 200, 78 130 C 60 116, -60 116, -78 130 Z"
      fill="#FFF7EE"/>

    <!-- ARMS -->
    <path d="M -120 90 C -156 110, -170 170, -154 220 C -136 244, -110 240, -100 218 C -94 184, -100 130, -120 90 Z"
      fill="#A8E0D5" stroke="#3D2B3D" stroke-width="5" stroke-linejoin="round"/>
    <ellipse cx="-128" cy="220" rx="22" ry="14" fill="#FFF7EE" stroke="#3D2B3D" stroke-width="4"/>
    <path d="M 120 90 C 156 110, 170 170, 154 220 C 136 244, 110 240, 100 218 C 94 184, 100 130, 120 90 Z"
