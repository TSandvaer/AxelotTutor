<?xml version="1.0" encoding="UTF-8"?>
<!--
  axel-puzzled.svg — PLACEHOLDER
  Carried over from MarianLearning. Kyle replaces with the Axel puzzled pose
  in UX-03 (gentle confusion, never disappointment).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Axel, puzzled">
  <title>Axel — puzzled</title>

  <g transform="translate(400 410)">

    <!-- ========== BODY (identical to idle, NOT tilted) ========== -->
    <ellipse cx="-46" cy="320" rx="36" ry="22" fill="#FFF5F0" stroke="#3D2B3D" stroke-width="5"/>
    <ellipse cx=" 46" cy="320" rx="36" ry="22" fill="#FFF5F0" stroke="#3D2B3D" stroke-width="5"/>

    <path d="
      M -110 110
      C -130 180, -120 280, -70 310
      C -30 322,  30 322,  70 310
      C  120 280, 130 180, 110 110
      C  90  90,  -90  90, -110 110 Z"
      fill="#FFF5F0" stroke="#3D2B3D" stroke-width="5" stroke-linejoin="round"/>

    <!-- LEFT arm (resting) -->
    <path d="
      M -110 130
      C -150 160, -160 220, -140 250
      C -120 260, -100 250,  -96 230
      C  -94 200,  -98 160, -110 130 Z"
      fill="#FFF5F0" stroke="#3D2B3D" stroke-width="5" stroke-linejoin="round"/>

    <!-- RIGHT arm (raised, hand near chin — "thinking" gesture) -->
    <path d="
      M 110 130
      C 150 100, 150  60, 130  40
      C 110  30,  90  50,  90  80
      C  92 110, 100 124, 110 130 Z"
      fill="#FFF5F0" stroke="#3D2B3D" stroke-width="5" stroke-linejoin="round"/>

    <!-- Ribbon -->
    <g transform="translate(0 165)">
      <path d="M -34 -8 C -44 -22, -28 -28, -14 -14 L -14 6 C -28 12, -44 8, -34 -8 Z"
        fill="#F48FB1" stroke="#3D2B3D" stroke-width="3.5" stroke-linejoin="round"/>
      <path d="M  34 -8 C  44 -22,  28 -28,  14 -14 L  14 6 C  28 12,  44 8,  34 -8 Z"
        fill="#F48FB1" stroke="#3D2B3D" stroke-width="3.5" stroke-linejoin="round"/>
      <rect x="-12" y="-12" width="24" height="20" rx="4" fill="#F48FB1" stroke="#3D2B3D" stroke-width="3.5"/>
    </g>

    <!-- ========== HEAD GROUP (tilted 15° about neck pivot at 0,90) ========== -->
    <g transform="rotate(15 0 90)">

      <!-- LEFT ear (drooped: rotated -8° outward AND -22° downward at base) -->
      <g transform="rotate(-22 -90 -110)">
        <path d="
          M -90 -110
          C -150 -180, -170 -280, -150 -340
          C -130 -370,  -90 -362,  -76 -320
          C  -64 -270,  -64 -200,  -72 -150
          C  -78 -126, -84 -114, -90 -110 Z"
          fill="#FFC0CB" stroke="#3D2B3D" stroke-width="5" stroke-linejoin="round"/>
        <path d="
          M -88 -130
          C -130 -190, -148 -270, -134 -316
          C -120 -340,  -98 -334,  -90 -304
          C  -82 -260,  -82 -210,  -86 -170
          C  -88 -148, -88 -134, -88 -130 Z"
          fill="#FFF5F0"/>
      </g>

      <!-- RIGHT ear (drooped: rotated +24° outward) -->
      <g transform="rotate(24 90 -110)">
        <path d="
          M 90 -110
          C 150 -180, 170 -280, 150 -340
          C 130 -370,  90 -362,  76 -320
          C  64 -270,  64 -200,  72 -150
          C  78 -126, 84 -114, 90 -110 Z"
          fill="#FFC0CB" stroke="#3D2B3D" stroke-width="5" stroke-linejoin="round"/>
        <path d="
          M 88 -130
          C 130 -190, 148 -270, 134 -316
          C 120 -340,  98 -334,  90 -304
          C  82 -260,  82 -210,  86 -170
          C  88 -148, 88 -134, 88 -130 Z"
          fill="#FFF5F0"/>
      </g>

      <!-- Hood -->
      <path d="
        M -180 20
        C -200 -80, -160 -170, -100 -200
        C  -50 -220,   50 -220,  100 -200
        C  160 -170,  200 -80,  180  20
        C  170  60,  120  84,   80  90
        L -80  90
        C -120  84, -170  60, -180  20 Z"
        fill="#FFC0CB" stroke="#3D2B3D" stroke-width="5" stroke-linejoin="round"/>

      <!-- Face -->
      <ellipse cx="0" cy="20" rx="116" ry="98" fill="#FFF5F0" stroke="#3D2B3D" stroke-width="5"/>

      <!-- Eyes: dots placed slightly upward (looking up, thinking) -->
      <ellipse cx="-40" cy="6" rx="9" ry="11" fill="#3D2B3D"/>
      <ellipse cx=" 40" cy="6" rx="9" ry="11" fill="#3D2B3D"/>

      <!-- Cheek blush -->
      <ellipse cx="-66" cy="48" rx="16" ry="8" fill="#F8C8DC"/>
      <ellipse cx=" 66" cy="48" rx="16" ry="8" fill="#F8C8DC"/>

      <!-- Nose -->
      <path d="M -7 38 L 7 38 L 0 48 Z"
        fill="#F48FB1" stroke="#3D2B3D" stroke-width="2.5" stroke-linejoin="round"/>

      <!-- Round "o" mouth (small surprise) -->
      <ellipse cx="0" cy="68" rx="7" ry="9" fill="#3D2B3D"/>

      <!-- Flower -->
      <g transform="translate(130 -120)">
        <ellipse cx="0"   cy="-26" rx="14" ry="20" fill="#FFF5F0" stroke="#3D2B3D" stroke-width="4"/>
        <ellipse cx="25"  cy="-8"  rx="14" ry="20" fill="#FFF5F0" stroke="#3D2B3D" stroke-width="4" transform="rotate(72 25 -8)"/>
        <ellipse cx="15"  cy="22"  rx="14" ry="20" fill="#FFF5F0" stroke="#3D2B3D" stroke-width="4" transform="rotate(144 15 22)"/>
        <ellipse cx="-15" cy="22"  rx="14" ry="20" fill="#FFF5F0" stroke="#3D2B3D" stroke-width="4" transform="rotate(216 -15 22)"/>
        <ellipse cx="-25" cy="-8"  rx="14" ry="20" fill="#FFF5F0" stroke="#3D2B3D" stroke-width="4" transform="rotate(288 -25 -8)"/>
        <circle r="12" fill="#FFD966" stroke="#3D2B3D" stroke-width="4"/>
      </g>

    </g>

    <!-- Question mark glyph above right ear (NOT inside head group, stays upright) -->
    <g transform="translate(220 -300)">
      <text x="0" y="0"
        font-family="-apple-system, 'SF Pro Rounded', 'SF Pro', 'Segoe UI', system-ui, sans-serif"
        font-weight="800"
        font-size="80"
        fill="#F48FB1"
        stroke="#3D2B3D"
        stroke-width="3"
        text-anchor="middle"
        paint-order="stroke">?</text>
    </g>

  </g>
</svg>
