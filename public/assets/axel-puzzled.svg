<?xml version="1.0" encoding="UTF-8"?>
<!--
  axel-puzzled.svg — Axel-the-axolotl, gentle puzzlement.
  Spec: design/axel-character-bible.md (UX-03, 86c9gqq04).

  Replaces every "wrong answer" surface — there is no red X anywhere in
  the app. Read: head tilted 15°, ONE gill rosette droops (right side,
  matching the head-tilt direction so the silhouette feels natural under
  gravity), eyes look slightly upward (thinking), small "o" mouth (soft
  surprise), single "?" floating above. Body is upright; the tilt lives
  on the head only so the character doesn't read as falling-over.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Axel, puzzled">
  <title>Axel — puzzled</title>
  <g transform="translate(400 410)">

    <!-- TAIL -->
    <path d="M 70 240 C 130 260, 170 280, 180 320 C 175 348, 140 358, 100 348 C 80 340, 70 318, 70 280 Z"
      fill="#5BBFAE" stroke="#3D2B3D" stroke-width="5" stroke-linejoin="round"/>
    <path d="M 78 312 C 110 332, 150 332, 168 318 C 158 342, 130 354, 100 348 C 86 344, 78 330, 78 312 Z"
      fill="#FFF7EE"/>

    <!-- LEGS / FEET -->
    <g stroke="#3D2B3D" stroke-width="5" stroke-linejoin="round" stroke-linecap="round">
      <ellipse cx="-66" cy="318" rx="34" ry="20" fill="#A8E0D5"/>
      <ellipse cx=" 66" cy="318" rx="34" ry="20" fill="#A8E0D5"/>
      <path d="M -84 332 L -84 340" fill="none"/>
      <path d="M -66 336 L -66 344" fill="none"/>
      <path d="M -48 332 L -48 340" fill="none"/>
      <path d="M  48 332 L  48 340" fill="none"/>
      <path d="M  66 336 L  66 344" fill="none"/>
      <path d="M  84 332 L  84 340" fill="none"/>
    </g>

    <!-- BODY -->
    <path d="M -130 60 C -150 150, -130 270, -70 308 C -30 320, 30 320, 70 308 C 130 270, 150 150, 130 60 C 100 30, -100 30, -130 60 Z"
      fill="#A8E0D5" stroke="#3D2B3D" stroke-width="5" stroke-linejoin="round"/>
    <path d="M -78 130 C -90 200, -70 290, -34 304 C -10 312, 10 312, 34 304 C 70 290, 90 200, 78 130 C 60 116, -60 116, -78 130 Z"
      fill="#FFF7EE"/>

    <!-- LEFT arm resting -->
    <path d="M -120 90 C -156 110, -170 170, -154 220 C -136 244, -110 240, -100 218 C -94 184, -100 130, -120 90 Z"
      fill="#A8E0D5" stroke="#3D2B3D" stroke-width="5" stroke-linejoin="round"/>
    <ellipse cx="-128" cy="220" rx="22" ry="14" fill="#FFF7EE" stroke="#3D2B3D" stroke-width="4"/>

    <!-- RIGHT arm raised — paw near chin "thinking" -->
    <path d="M 120 90 C 150 60, 150 10, 130 -10 C 110 -22, 90 0, 90 30 C 92 60, 100 78, 120 90 Z"
      fill="#A8E0D5" stroke="#3D2B3D" stroke-width="5" stroke-linejoin="round"/>
    <ellipse cx="125" cy="-12" rx="18" ry="14" fill="#FFF7EE" stroke="#3D2B3D" stroke-width="4"/>

    <!-- HEART MEDALLION -->
    <g transform="translate(0 170)">
      <path d="M 0 22 C -8 14, -28 14, -28 0 C -28 -14, -10 -18, 0 -6 C 10 -18, 28 -14, 28 0 C 28 14, 8 14, 0 22 Z"
        fill="#FFB5A0" stroke="#3D2B3D" stroke-width="3.5" stroke-linejoin="round"/>
      <ellipse cx="-12" cy="-6" rx="4" ry="6" fill="#FFF7EE" opacity="0.85"/>
    </g>

    <!-- HEAD GROUP (tilted 15° about neck pivot at 0,40) -->
    <g transform="rotate(15 0 40)">
      <!-- LEFT gill rosette — slightly drooped, -10° -->
      <g transform="rotate(-10 -94 -110)">
        <g stroke="#3D2B3D" stroke-width="4" stroke-linejoin="round" stroke-linecap="round">
          <path d="M -94 -120 C -160 -180, -200 -210, -208 -180 C -210 -156, -180 -130, -140 -110 C -120 -100, -100 -100, -94 -110 Z" fill="#FFB5A0"/>
          <path d="M -130 -148 C -172 -178, -198 -188, -202 -178" fill="none" stroke="#F08070" stroke-width="3"/>
          <path d="M -98 -90 C -180 -90, -226 -76, -230 -50 C -224 -28, -190 -20, -150 -32 C -120 -42, -100 -56, -98 -76 Z" fill="#FFB5A0"/>
          <path d="M -140 -64 C -200 -56, -222 -48, -222 -38" fill="none" stroke="#F08070" stroke-width="3"/>
          <path d="M -100 -52 C -170 -28, -206 -2, -200 24 C -188 42, -156 38, -126 18 C -110 6, -100 -16, -100 -40 Z" fill="#FFB5A0"/>
          <path d="M -136 -10 C -184 8, -202 22, -198 32" fill="none" stroke="#F08070" stroke-width="3"/>
        </g>
      </g>
      <!-- RIGHT gill rosette — heavily drooped, +30° -->
      <g transform="rotate(30 94 -110)">
        <g stroke="#3D2B3D" stroke-width="4" stroke-linejoin="round" stroke-linecap="round">
          <path d="M 94 -120 C 160 -180, 200 -210, 208 -180 C 210 -156, 180 -130, 140 -110 C 120 -100, 100 -100, 94 -110 Z" fill="#FFB5A0"/>
          <path d="M 130 -148 C 172 -178, 198 -188, 202 -178" fill="none" stroke="#F08070" stroke-width="3"/>
          <path d="M 98 -90 C 180 -90, 226 -76, 230 -50 C 224 -28, 190 -20, 150 -32 C 120 -42, 100 -56, 98 -76 Z" fill="#FFB5A0"/>
          <path d="M 140 -64 C 200 -56, 222 -48, 222 -38" fill="none" stroke="#F08070" stroke-width="3"/>
          <path d="M 100 -52 C 170 -28, 206 -2, 200 24 C 188 42, 156 38, 126 18 C 110 6, 100 -16, 100 -40 Z" fill="#FFB5A0"/>
          <path d="M 136 -10 C 184 8, 202 22, 198 32" fill="none" stroke="#F08070" stroke-width="3"/>
        </g>
      </g>
      <!-- HEAD -->
      <ellipse cx="0" cy="-60" rx="116" ry="100" fill="#A8E0D5" stroke="#3D2B3D" stroke-width="5"/>
      <!-- EYES -->
      <ellipse cx="-36" cy="-66" rx="9" ry="11" fill="#3D2B3D"/>
      <ellipse cx=" 36" cy="-66" rx="9" ry="11" fill="#3D2B3D"/>
      <circle cx="-32" cy="-72" r="2.5" fill="#FFF7EE"/>
      <circle cx=" 40" cy="-72" r="2.5" fill="#FFF7EE"/>
      <!-- CHEEK BLUSH -->
      <ellipse cx="-58" cy="-30" rx="14" ry="7" fill="#FFB5A0" opacity="0.5"/>
      <ellipse cx=" 58" cy="-30" rx="14" ry="7" fill="#FFB5A0" opacity="0.5"/>
      <!-- "o" MOUTH -->
      <ellipse cx="0" cy="-12" rx="7" ry="9" fill="#3D2B3D"/>
      <!-- LILY PAD -->
      <g transform="translate(56 -150)">
        <path d="M -28 0 A 28 28 0 1 1 28 0 A 28 28 0 1 1 -28 0 L -8 0 L 0 -22 L 8 0 Z"
          fill="#7FB069" stroke="#3D2B3D" stroke-width="3" stroke-linejoin="round"/>
        <path d="M -16 8 Q 0 14, 16 8" fill="none" stroke="#3D2B3D" stroke-width="2" opacity="0.5"/>
      </g>
    </g>

    <!-- "?" GLYPH (NOT inside head group — stays upright) -->
    <g transform="translate(220 -260)">
      <text x="0" y="0"
        font-family="-apple-system, 'SF Pro Rounded', 'SF Pro', 'Segoe UI', system-ui, sans-serif"
        font-weight="800"
        font-size="80"
        fill="#FFB5A0"
        stroke="#3D2B3D"
        stroke-width="3"
        text-anchor="middle"
        paint-order="stroke">?</text>
    </g>

  </g>
</svg>
