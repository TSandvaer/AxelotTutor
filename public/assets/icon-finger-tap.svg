<?xml version="1.0" encoding="UTF-8"?>
<!--
  icon-finger-tap.svg
  Finger-tap affordance icon for Greet's wake re-prompt. Reads as "tap here"
  without text for a low-literacy reader.
  - viewBox 0 0 64 64 — author-rendered at 48pt on iPad portrait viewport
  - Silhouette-first: smooth lobed fist + single extended index finger, no anatomy detailing
  - Lineart: stroke #3D2B3D at 2pt, stroke-linejoin/linecap round (matches Axel character family)
  - Fill #F48FB1 (--axel-rose); soft #FFC0CB (--axel-pink) highlight at low opacity for gentle volume
  - Target dot in --axel-rose at 0.35 opacity to suggest "the place to tap"
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Tap here">
  <title>Tap here</title>

  <!-- Soft target dot beneath fingertip -->
  <circle cx="32" cy="50" r="6" fill="#F48FB1" opacity="0.35"/>
  <circle cx="32" cy="50" r="3" fill="#F48FB1" opacity="0.55"/>

  <!-- Hand + extended index finger, single closed path -->
  <!-- Index finger points up, tip just touching the target dot at y=44.
       Lower fist is a smooth rounded lobe (no individual fingers carved out). -->
  <path d="
    M 32 44
    C 28.5 44, 27 41, 27 37
    L 27 24
    C 27 20.5, 29 18, 32 18
    C 35 18, 37 20.5, 37 24
    L 37 33
    C 39 32, 42 33, 43 36
    L 44.5 41
    C 46 45, 46 49, 44 52
    C 42 55, 38 56, 34 56
    L 28 56
    C 23 56, 20 53, 20 48
    L 20 41
    C 20 37, 22 35, 25 35
    C 26.5 35, 27 36, 27 37 Z"
    fill="#F48FB1"
    stroke="#3D2B3D"
    stroke-width="2"
    stroke-linejoin="round"
    stroke-linecap="round"/>

  <!-- Soft highlight on the finger pad for volume -->
  <ellipse cx="30" cy="24" rx="2.2" ry="3.2" fill="#FFC0CB" opacity="0.6"/>

  <!-- Wrist hint: subtle rounded base under the fist, same fill, no stroke -->
  <path d="
    M 24 55
    C 24 58, 27 59, 32 59
    C 37 59, 40 58, 40 55 Z"
    fill="#F48FB1"/>
</svg>
