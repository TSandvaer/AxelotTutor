<?xml version="1.0" encoding="UTF-8"?>
<!--
  axel-happy.svg — Axel-the-axolotl, happy / "ear-wiggle equivalent" pose.
  Spec: design/axel-character-bible.md (UX-03, 86c9gqq04).

  Cross-fades with axel-idle.svg on the word "Hi!" (Greet line 1) and on
  every correct-answer reaction. Axolotl equivalent of My Melody's ear-
  wiggle: BOTH gill rosettes fan upward and outward, eyes squinch into ^_^
  arches, smile opens slightly. Body unchanged from idle so the cross-fade
  reads as a head-region transformation.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Axel, happy">
  <title>Axel — happy</title>
  <g transform="translate(400 410)">

    <!-- TAIL -->
    <path d="M 70 240 C 130 260, 170 280, 180 320 C 175 348, 140 358, 100 348 C 80 340, 70 318, 70 280 Z"
      fill="#5BBFAE" stroke="#3D2B3D" stroke-width="5" stroke-linejoin="round"/>
    <path d="M 78 312 C 110 332, 150 332, 168 318 C 158 342, 130 354, 100 348 C 86 344, 78 330, 78 312 Z"
      fill="#FFF7EE"/>

    <!-- LEGS / FEET -->
    <g stroke="#3D2B3D" stroke-width="5" stroke-linejoin="round" stroke-linecap="round">
      <ellipse cx="-66" cy="318" rx="34" ry="20" fill="#A8E0D5"/>
      <ellipse cx=" 66" cy="318" rx="34" ry="20" fill="#A8E0D5"/>
      <path d="M -84 332 L -84 340" fill="none"/>
      <path d="M -66 336 L -66 344" fill="none"/>
      <path d="M -48 332 L -48 340" fill="none"/>
      <path d="M  48 332 L  48 340" fill="none"/>
      <path d="M  66 336 L  66 344" fill="none"/>
      <path d="M  84 332 L  84 340" fill="none"/>
    </g>

    <!-- BODY -->
    <path d="M -130 60 C -150 150, -130 270, -70 308 C -30 320, 30 320, 70 308 C 130 270, 150 150, 130 60 C 100 30, -100 30, -130 60 Z"
      fill="#A8E0D5" stroke="#3D2B3D" stroke-width="5" stroke-linejoin="round"/>
    <path d="M -78 130 C -90 200, -70 290, -34 304 C -10 312, 10 312, 34 304 C 70 290, 90 200, 78 130 C 60 116, -60 116, -78 130 Z"
      fill="#FFF7EE"/>

    <!-- ARMS slightly raised -->
    <path d="M -120 90 C -160 60, -180 0, -170 -40 C -156 -56, -134 -46, -124 -16 C -116 20, -108 60, -120 90 Z"
      fill="#A8E0D5" stroke="#3D2B3D" stroke-width="5" stroke-linejoin="round"/>
    <ellipse cx="-176" cy="-30" rx="16" ry="14" fill="#FFF7EE" stroke="#3D2B3D" stroke-width="4"/>
    <path d="M 120 90 C 160 60, 180 0, 170 -40 C 156 -56, 134 -46, 124 -16 C 116 20, 108 60, 120 90 Z"
      fill="#A8E0D5" stroke="#3D2B3D" stroke-width="5" stroke-linejoin="round"/>
    <ellipse cx="176" cy="-30" rx="16" ry="14" fill="#FFF7EE" stroke="#3D2B3D" stroke-width="4"/>

    <!-- HEART MEDALLION -->
    <g transform="translate(0 170)">
      <path d="M 0 22 C -8 14, -28 14, -28 0 C -28 -14, -10 -18, 0 -6 C 10 -18, 28 -14, 28 0 C 28 14, 8 14, 0 22 Z"
        fill="#FFB5A0" stroke="#3D2B3D" stroke-width="3.5" stroke-linejoin="round"/>
      <ellipse cx="-12" cy="-6" rx="4" ry="6" fill="#FFF7EE" opacity="0.85"/>
    </g>

    <!-- LEFT GILL ROSETTE — fanned UP and OUT, -8° -->
    <g transform="rotate(-8 -94 -110)">
      <g stroke="#3D2B3D" stroke-width="4" stroke-linejoin="round" stroke-linecap="round">
        <path d="M -94 -120 C -160 -190, -210 -240, -218 -206 C -218 -178, -184 -150, -140 -118 C -120 -106, -100 -106, -94 -116 Z" fill="#FFB5A0"/>
        <path d="M -130 -158 C -172 -198, -208 -212, -210 -200" fill="none" stroke="#F08070" stroke-width="3"/>
        <path d="M -98 -90 C -180 -100, -232 -90, -240 -60 C -230 -34, -196 -28, -156 -42 C -124 -54, -100 -68, -98 -86 Z" fill="#FFB5A0"/>
        <path d="M -150 -76 C -210 -72, -228 -62, -226 -52" fill="none" stroke="#F08070" stroke-width="3"/>
        <path d="M -100 -52 C -174 -36, -210 -16, -206 12 C -198 30, -164 24, -132 4 C -114 -8, -100 -28, -100 -42 Z" fill="#FFB5A0"/>
        <path d="M -140 -22 C -188 -6, -204 8, -200 18" fill="none" stroke="#F08070" stroke-width="3"/>
      </g>
    </g>

    <!-- RIGHT GILL ROSETTE — mirrored, +8° -->
    <g transform="rotate(8 94 -110)">
      <g stroke="#3D2B3D" stroke-width="4" stroke-linejoin="round" stroke-linecap="round">
        <path d="M 94 -120 C 160 -190, 210 -240, 218 -206 C 218 -178, 184 -150, 140 -118 C 120 -106, 100 -106, 94 -116 Z" fill="#FFB5A0"/>
        <path d="M 130 -158 C 172 -198, 208 -212, 210 -200" fill="none" stroke="#F08070" stroke-width="3"/>
        <path d="M 98 -90 C 180 -100, 232 -90, 240 -60 C 230 -34, 196 -28, 156 -42 C 124 -54, 100 -68, 98 -86 Z" fill="#FFB5A0"/>
        <path d="M 150 -76 C 210 -72, 228 -62, 226 -52" fill="none" stroke="#F08070" stroke-width="3"/>
        <path d="M 100 -52 C 174 -36, 210 -16, 206 12 C 198 30, 164 24, 132 4 C 114 -8, 100 -28, 100 -42 Z" fill="#FFB5A0"/>
        <path d="M 140 -22 C 188 -6, 204 8, 200 18" fill="none" stroke="#F08070" stroke-width="3"/>
      </g>
    </g>

    <!-- HEAD -->
    <ellipse cx="0" cy="-60" rx="116" ry="100" fill="#A8E0D5" stroke="#3D2B3D" stroke-width="5"/>

    <!-- HAPPY EYES (^_^ arches) -->
    <path d="M -50 -56 Q -36 -72, -22 -56" fill="none" stroke="#3D2B3D" stroke-width="6" stroke-linecap="round"/>
    <path d="M  22 -56 Q  36 -72,  50 -56" fill="none" stroke="#3D2B3D" stroke-width="6" stroke-linecap="round"/>

    <!-- CHEEK BLUSH (deeper) -->
    <ellipse cx="-58" cy="-28" rx="18" ry="9" fill="#FFB5A0" opacity="0.75"/>
    <ellipse cx=" 58" cy="-28" rx="18" ry="9" fill="#FFB5A0" opacity="0.75"/>

    <!-- OPEN HAPPY SMILE -->
    <path d="M -26 -18 Q 0 6, 26 -18 Q 0 -4, -26 -18 Z"
      fill="#3D2B3D" stroke="#3D2B3D" stroke-width="2" stroke-linejoin="round"/>
    <path d="M -10 -8 Q 0 0, 10 -8 Q 0 -4, -10 -8 Z" fill="#F08070"/>

    <!-- LILY PAD -->
    <g transform="translate(56 -150)">
      <path d="M -28 0 A 28 28 0 1 1 28 0 A 28 28 0 1 1 -28 0 L -8 0 L 0 -22 L 8 0 Z"
        fill="#7FB069" stroke="#3D2B3D" stroke-width="3" stroke-linejoin="round"/>
      <path d="M -16 8 Q 0 14, 16 8" fill="none" stroke="#3D2B3D" stroke-width="2" opacity="0.5"/>
    </g>

    <!-- A couple of subtle sparkles -->
    <g fill="#FFD966" stroke="#3D2B3D" stroke-width="2" stroke-linejoin="round">
      <path d="M -240 -120 l 5 14 l 14 5 l -14 5 l -5 14 l -5 -14 l -14 -5 l 14 -5 z"/>
      <path d="M  240 -140 l 4 11 l 11 4 l -11 4 l -4 11 l -4 -11 l -11 -4 l 11 -4 z"/>
    </g>

  </g>
</svg>
